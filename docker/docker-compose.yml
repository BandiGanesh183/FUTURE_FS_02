version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: crm_mysql
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: crm_database
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ../database/schema.sql:/docker-entrypoint-initdb.d/1-schema.sql
    networks:
      - crm_network

  backend-1:
    build:
      context: ..
      dockerfile: docker/Dockerfile.backend
    environment:
      DB_HOST: mysql
      DB_PASSWORD: rootpassword
      NODE_ENV: production
      PORT: 5001
    ports:
      - "5001:5001"
    depends_on:
      - mysql
    networks:
      - crm_network

  backend-2:
    build:
      context: ..
      dockerfile: docker/Dockerfile.backend
    environment:
      DB_HOST: mysql
      DB_PASSWORD: rootpassword
      NODE_ENV: production
      PORT: 5002
    ports:
      - "5002:5002"
    depends_on:
      - mysql
    networks:
      - crm_network

  nginx-lb:
    image: nginx:alpine
    container_name: crm_nginx_lb
    ports:
      - "80:80"
    volumes:
      - ../nginx/nginx.conf:/etc/nginx/nginx.conf
    depends_on:
      - backend-1
      - backend-2
    networks:
      - crm_network

volumes:
  mysql_data:

networks:
  crm_network:
    driver: bridge